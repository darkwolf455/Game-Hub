<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Hub Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body class="ttt-bg">
    <div class="background-overlay"></div>
    
    <div class="wrapper">
        <header>
            <h1 class="main-title">RETRO HUB</h1>
            <nav class="game-nav">
                <button class="nav-btn active" onclick="showGame('ttt', this)">Tic Tac Toe</button>
                <button class="nav-btn" onclick="showGame('mem', this)">Card Flip</button>
                <button class="nav-btn" onclick="showGame('snk', this)">Snake Pro</button>
            </nav>
        </header>

        <main class="game-container">
            <!-- TIC TAC TOE SECTION -->
            <section id="ttt-container" class="game-card active">
                <div class="status-bar ttt-info">Current Turn: X</div>
                <div class="ttt-controls">
                    <div class="mode-container-separated">
                        <button class="mode-btn active-tab" id="pvp-btn">P &nbsp; vs &nbsp; P</button>
                        <button class="mode-btn" id="pve-btn">P &nbsp; vs &nbsp; Bot</button>
                    </div>
                    <div class="segmented-control" id="ttt-diff-box" style="display: none;">
                        <button class="ttt-diff-btn active-tab" data-level="easy">Kid</button>
                        <button class="ttt-diff-btn" data-level="medium">Pro</button>
                        <button class="ttt-diff-btn" data-level="hard">Boss</button>
                    </div>
                </div>
                <div class="tic-tac-toe">
                    <div class="box" data-index="0"></div><div class="box" data-index="1"></div><div class="box" data-index="2"></div>
                    <div class="box" data-index="3"></div><div class="box" data-index="4"></div><div class="box" data-index="5"></div>
                    <div class="box" data-index="6"></div><div class="box" data-index="7"></div><div class="box" data-index="8"></div>
                </div>
                <button class="action-btn" onclick="initTTT()">Reset Game</button>
            </section>

            <!-- CARD FLIP SECTION -->
            <section id="mem-container" class="game-card">
                <div class="status-bar mem-info">Pairs Found: 0</div>
                <div class="segmented-control">
                    <button class="mem-diff-btn active-tab" data-level="easy">Easy</button>
                    <button class="mem-diff-btn" data-level="medium">Medium</button>
                    <button class="mem-diff-btn" data-level="hard">Hard</button>
                </div>
                <div class="memory-grid" id="memory-grid"></div>
                <button class="action-btn" onclick="initMemory()">Shuffle Cards</button>
            </section>

            <!-- SNAKE PRO SECTION -->
            <section id="snk-container" class="game-card">
                <div class="status-bar">Score: <span id="snk-sc">0</span></div>
                <canvas id="snakeCanvas" width="300" height="300"></canvas>
                
                <div class="d-pad">
                    <button class="d-btn up" onclick="changeDir('up')">▲</button>
                    <button class="d-btn left" onclick="changeDir('left')">◀</button>
                    <button class="d-btn right" onclick="changeDir('right')">▶</button>
                    <button class="d-btn down" onclick="changeDir('down')">▼</button>
                </div>
                <button class="action-btn" onclick="startSnake()">Start Game</button>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
